<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>{% block title %}Ferre{% endblock %}</title>
    <style>
        :root {
            --app-bg: #0f172a;
            --app-card: #111827;
            --app-card-2: #1f2937;
            --app-border: #334155;
            --app-text: #e2e8f0;
            --app-muted: #94a3b8;
            --app-primary: #3256d4;
            --app-primary-hover: #2a46ad;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--app-text);
            background:
                radial-gradient(circle at 14% 12%, rgba(50, 86, 212, 0.18), transparent 42%),
                radial-gradient(circle at 82% 20%, rgba(148, 163, 184, 0.12), transparent 32%),
                var(--app-bg);
            min-height: 100vh;
        }

        .app-shell {
            max-width: 1100px;
        }

        .app-panel {
            border: 1px solid color-mix(in srgb, var(--app-border) 70%, transparent);
            background-color: color-mix(in srgb, var(--app-card) 92%, transparent);
            border-radius: 1.25rem;
            box-shadow: 0 12px 32px rgba(2, 6, 23, 0.45);
            overflow: hidden;
        }

        .app-panel-header {
            border-bottom: 1px solid color-mix(in srgb, var(--app-border) 70%, transparent);
            background-color: rgba(17, 24, 39, 0.7);
        }

        .app-card {
            border: 1px solid color-mix(in srgb, var(--app-border) 70%, transparent);
            background-color: rgba(31, 41, 55, 0.65);
            border-radius: 1rem;
        }

        .app-muted {
            color: var(--app-muted);
        }

        .btn-app-primary {
            --bs-btn-bg: var(--app-primary);
            --bs-btn-border-color: var(--app-primary);
            --bs-btn-hover-bg: var(--app-primary-hover);
            --bs-btn-hover-border-color: var(--app-primary-hover);
            --bs-btn-color: #f8fafc;
            --bs-btn-hover-color: #f8fafc;
        }

        .btn-app-secondary {
            --bs-btn-bg: #334155;
            --bs-btn-border-color: #334155;
            --bs-btn-hover-bg: #475569;
            --bs-btn-hover-border-color: #475569;
            --bs-btn-color: #e2e8f0;
            --bs-btn-hover-color: #f8fafc;
        }

        .form-control,
        .form-select {
            border-color: #475569;
            background-color: #1e293b;
            color: var(--app-text);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #3f6df5;
            box-shadow: 0 0 0 0.2rem rgba(63, 109, 245, 0.25);
            background-color: #1e293b;
            color: var(--app-text);
        }

        .form-control[readonly] {
            opacity: 0.7;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--app-text);
            --bs-table-border-color: rgba(51, 65, 85, 0.85);
            --bs-table-striped-bg: rgba(51, 65, 85, 0.2);
            --bs-table-striped-color: var(--app-text);
            --bs-table-hover-bg: rgba(71, 85, 105, 0.22);
            --bs-table-hover-color: #f8fafc;
        }

        .table thead th {
            color: #cbd5e1;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .flash {
            border-radius: 0.75rem;
        }

        .flash.error,
        .flash.danger {
            border: 1px solid #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
            color: #fecaca;
        }

        .flash.warning {
            border: 1px solid #854d0e;
            background: rgba(133, 77, 14, 0.2);
            color: #fde68a;
        }

        .flash.success,
        .flash.exito {
            border: 1px solid #14532d;
            background: rgba(20, 83, 45, 0.2);
            color: #bbf7d0;
        }
    </style>
</head>
<body>
    <main class="container app-shell px-3 px-sm-4 py-4 py-md-5">
        {% block content %}
        {% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
